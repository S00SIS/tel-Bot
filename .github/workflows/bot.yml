name: Telegram Proxy Bot - Always On

on:
  workflow_dispatch:  # فقط اجرای دستی
  push:
    branches: [ main ]

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 360  # حداکثر 6 ساعت (حداکثر مجاز گیت‌هاب)
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
        
    - name: Install dependencies
      run: pip install requests
      
    - name: Run bot continuously
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      run: |
        while true; do
          python bot.py
          echo "ربات متوقف شد، دوباره اجرا می‌شود..."
          sleep 5
        done
